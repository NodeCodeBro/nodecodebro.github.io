<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The NodeCodium</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1>The NodeCodium</h1>
            <a href="https://matrix.to/#/#thenodecodium:matrix.org" class="btn btn-primary">Join Matrix</a>
        </div>
    </header>

    <main>
        <section id="projects" class="projects">
            <div class="container">
                <h2>Projects</h2>
                <div class="projects-grid" id="projects-container">
                </div>
            </div>
        </section>

        <section id="community" class="community">
            <div class="container">
                <h2>Community</h2>
                <p>Connect on <a href="https://matrix.to/#/#thenodecodium:matrix.org" class="link-accent">Matrix</a></p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-creator">
                    <img src="icon.png" alt="NodeCodeBro" class="footer-icon">
                    <p>NodeCodeBro</p>
                </div>
                <p class="footer-copyright">&copy; 2026 The NodeCodium. All rights reserved.</p>
            </div>
        </div>
    </footer>
